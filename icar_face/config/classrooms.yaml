# ============================================================
# iCar 教室 SLAM 坐标映射
# ============================================================
# 此文件存储 SLAM 建图后各教室在 map 坐标系下的实际位姿。
# 坐标需在建图完成后通过实际测量填入。
#
# 坐标系: SLAM map frame
# 单位:   位置—米(m), 朝向—弧度(rad)
#         0 rad = 朝 X 轴正方向
#         pi/2 rad = 朝 Y 轴正方向
#
# 测量方法:
#   1. 运行 SLAM 建图, 保存地图
#   2. 将小车放置在每个教室门口
#   3. 在 RViz 中查看 /amcl_pose 或 /tf 获取坐标
#   4. 将 (x, y, yaw) 填入下方
# ============================================================

# ── 充电桩 / 出发点 ──
charging_station:
  x: 0.0
  y: 0.0
  yaw: 0.0    # 朝向: 0=东, 1.57=北, 3.14=西, -1.57=南

# ── 逸夫楼 5 层教室 (501-512) ──
